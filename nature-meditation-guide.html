<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nature Meditation Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg1:#0b1a12;--bg2:#0d2218;
  --leaf:#4a7c59;--mist:#a8c5a0;--gold:#c9a84c;
  --text:#e8f0e4;--soft:#7a9e80;--faint:rgba(168,197,160,.12);
  --r:16px;
}

html,body{min-height:100vh;font-family:'Jost',sans-serif;overflow-x:hidden;cursor:default}

/* ── Living background ── */
#bg-canvas{position:fixed;inset:0;z-index:0}

body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(74,124,89,.08),transparent 70%);
}

/* ── Layout ── */
#app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 20px 80px}

/* ── Header ── */
header{text-align:center;margin-bottom:52px;animation:riseUp .9s ease both}
.eyebrow{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;opacity:.85}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,6vw,4.2rem);font-weight:300;line-height:1.1;color:var(--text);margin-bottom:14px}
h1 em{font-style:italic;color:var(--mist)}
header p{font-size:14px;color:var(--soft);max-width:380px;margin:0 auto;line-height:1.75;font-weight:300}

/* ── Card ── */
.glass{
  background:rgba(11,26,18,.75);
  border:1px solid rgba(168,197,160,.13);
  border-radius:var(--r);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}

/* ── Input section ── */
#input-card{width:100%;max-width:520px;padding:32px;margin-bottom:32px;animation:riseUp .9s .15s ease both;opacity:0}
.field-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--soft);margin-bottom:12px;display:block}

.input-wrap{position:relative;margin-bottom:20px}
.input-wrap input{
  width:100%;padding:16px 50px 16px 20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(168,197,160,.18);
  border-radius:10px;
  color:var(--text);font-family:'Jost',sans-serif;font-size:15px;font-weight:300;
  outline:none;transition:border-color .25s,box-shadow .25s;
}
.input-wrap input::placeholder{color:rgba(168,197,160,.35)}
.input-wrap input:focus{border-color:rgba(168,197,160,.45);box-shadow:0 0 0 3px rgba(168,197,160,.08)}
.input-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;opacity:.5}

/* Presets */
.presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.preset{padding:6px 14px;border:1px solid rgba(168,197,160,.15);border-radius:20px;
  font-size:12px;color:var(--soft);cursor:pointer;transition:all .2s;background:transparent;font-family:'Jost',sans-serif}
.preset:hover{border-color:rgba(168,197,160,.4);color:var(--mist);background:rgba(168,197,160,.06);transform:translateY(-1px)}

/* Generate button */
#gen-btn{
  width:100%;padding:16px;border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,#3a6b47,#2a5038);
  color:var(--mist);font-family:'Jost',sans-serif;font-size:14px;
  font-weight:400;letter-spacing:2px;text-transform:uppercase;
  transition:all .3s;position:relative;overflow:hidden;
  border:1px solid rgba(168,197,160,.2);
}
#gen-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent);opacity:0;transition:opacity .3s}
#gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(58,107,71,.45)}
#gen-btn:hover::before{opacity:1}
#gen-btn:active{transform:translateY(0)}
#gen-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ── Meditation section ── */
#meditation-card{width:100%;max-width:680px;display:none;animation:riseUp .7s ease both}
#meditation-card.visible{display:block}

/* Location badge */
#loc-badge{display:flex;align-items:center;gap:10px;padding:14px 20px;
  background:rgba(168,197,160,.06);border-bottom:1px solid rgba(168,197,160,.1)}
.loc-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:glowPulse 2s infinite}
#loc-name{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:400}
#loc-mood{margin-left:auto;font-size:11px;color:var(--soft);font-style:italic}

/* ── Breathing circle ── */
#breath-section{padding:40px 32px;text-align:center;border-bottom:1px solid rgba(168,197,160,.08)}
#breath-ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 28px}

.ring-outer{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(168,197,160,.12);animation:ringRotate 8s linear infinite}
.ring-mid{position:absolute;inset:12px;border-radius:50%;border:1px solid rgba(168,197,160,.08);animation:ringRotate 12s linear infinite reverse}

#breath-circle{
  position:absolute;inset:24px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,124,89,.35) 0%,rgba(74,124,89,.1) 60%,transparent 100%);
  border:1.5px solid rgba(168,197,160,.3);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:transform .1s;
}
#breath-circle.inhale{animation:breatheIn 4s ease-in-out forwards}
#breath-circle.hold{animation:holdBreath 4s ease-in-out forwards}
#breath-circle.exhale{animation:breatheOut 4s ease-in-out forwards}

#breath-emoji{font-size:28px;margin-bottom:4px;transition:all .5s}
#breath-word{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--mist);letter-spacing:3px;font-style:italic}

#phase-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--soft);margin-bottom:8px}
#phase-timer{font-family:'Cormorant Garamond',serif;font-size:42px;color:var(--text);font-weight:300;line-height:1;margin-bottom:6px}
#phase-name{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);height:16px}

/* breath controls */
#breath-controls{display:flex;gap:10px;justify-content:center;margin-top:20px}
.ctrl-btn{padding:8px 20px;border:1px solid rgba(168,197,160,.18);border-radius:20px;
  background:transparent;color:var(--soft);font-family:'Jost',sans-serif;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{border-color:rgba(168,197,160,.4);color:var(--mist);background:rgba(168,197,160,.06)}
.ctrl-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

/* ── Script section ── */
#script-section{padding:32px}
#script-title{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--soft);margin-bottom:20px;display:flex;align-items:center;gap:10px}
#script-title::after{content:'';flex:1;height:1px;background:rgba(168,197,160,.1)}

#script-lines{display:flex;flex-direction:column;gap:0}

.script-line{
  padding:14px 16px;border-radius:8px;
  font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;
  color:rgba(232,240,228,.3);line-height:1.7;
  transition:all .6s ease;position:relative;
  border-left:2px solid transparent;
}
.script-line.active{
  color:var(--text);border-left-color:var(--gold);
  background:rgba(201,168,76,.05);
  padding-left:20px;
}
.script-line.done{color:rgba(168,197,160,.35);border-left-color:transparent}
.script-line .line-num{font-size:10px;letter-spacing:2px;color:var(--soft);margin-right:10px;font-family:'Jost',sans-serif;opacity:.5}

/* progress bar */
#progress-wrap{height:2px;background:rgba(168,197,160,.08);border-radius:1px;margin:24px 0 0}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--leaf),var(--gold));border-radius:1px;transition:width .5s linear}

/* ── Stats ── */
#stats-row{display:flex;gap:0;margin-top:0;border-top:1px solid rgba(168,197,160,.08)}
.stat{flex:1;padding:18px;text-align:center;border-right:1px solid rgba(168,197,160,.08)}
.stat:last-child{border-right:none}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);font-weight:300}
.stat-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--soft);margin-top:3px}

/* ── Reset ── */
#reset-btn{margin-top:20px;display:block;text-align:center;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--soft);cursor:pointer;transition:color .2s;background:none;border:none;font-family:'Jost',sans-serif}
#reset-btn:hover{color:var(--mist)}

/* ── Animations ── */
@keyframes riseUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--gold)}50%{opacity:.4;box-shadow:none}}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes breatheIn{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(74,124,89,0)}
  100%{transform:scale(1.45);box-shadow:0 0 50px 10px rgba(74,124,89,.25)}
}
@keyframes holdBreath{
  0%,100%{transform:scale(1.45);box-shadow:0 0 50px 10px rgba(74,124,89,.25)}
  50%{transform:scale(1.48);box-shadow:0 0 60px 14px rgba(74,124,89,.3)}
}
@keyframes breatheOut{
  0%{transform:scale(1.45);box-shadow:0 0 50px 10px rgba(74,124,89,.25)}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(74,124,89,0)}
}
@keyframes leafFloat{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  10%{opacity:.7}
  90%{opacity:.3}
  100%{transform:translateY(-100vh) rotate(360deg);opacity:0}
}

/* ── Responsive ── */
@media(max-width:540px){
  #breath-ring-wrap{width:160px;height:160px}
  #phase-timer{font-size:32px}
  #script-section{padding:24px 20px}
  .script-line{font-size:15px}
  #input-card{padding:24px 20px}
}
</style>
</head>
<body>

<!-- Living canvas background -->
<canvas id="bg-canvas"></canvas>

<div id="app">

  <!-- Header -->
  <header>
    <p class="eyebrow">Nature · Breath · Stillness</p>
    <h1>Nature <em>Meditation</em><br>Guide</h1>
    <p>Enter any natural place and receive a gentle one-minute breathing script crafted just for that world</p>
  </header>

  <!-- Input Card -->
  <div class="glass" id="input-card">
    <span class="field-label">Where shall we breathe today?</span>

    <div class="input-wrap">
      <input type="text" id="location-input" placeholder="e.g. Pine Forest, Ocean Shore, Bamboo Grove…" maxlength="60"/>
      <span class="input-icon">🌿</span>
    </div>

    <div class="presets">
      <button class="preset" onclick="setPreset('Pine Forest')">🌲 Pine Forest</button>
      <button class="preset" onclick="setPreset('Ocean Shore')">🌊 Ocean Shore</button>
      <button class="preset" onclick="setPreset('Bamboo Grove')">🎋 Bamboo Grove</button>
      <button class="preset" onclick="setPreset('Mountain Peak')">🏔 Mountain Peak</button>
      <button class="preset" onclick="setPreset('Lavender Field')">💜 Lavender Field</button>
      <button class="preset" onclick="setPreset('Desert Dusk')">🌅 Desert Dusk</button>
      <button class="preset" onclick="setPreset('Autumn Forest')">🍂 Autumn Forest</button>
      <button class="preset" onclick="setPreset('Waterfall Cove')">💧 Waterfall Cove</button>
    </div>

    <button id="gen-btn" onclick="generate()">✦ Begin My Meditation</button>
  </div>

  <!-- Meditation Card -->
  <div class="glass" id="meditation-card">

    <!-- Top badge -->
    <div id="loc-badge">
      <div class="loc-dot"></div>
      <span id="loc-name">—</span>
      <span id="loc-mood">—</span>
    </div>

    <!-- Breathing circle -->
    <div id="breath-section">
      <div id="breath-ring-wrap">
        <div class="ring-outer"></div>
        <div class="ring-mid"></div>
        <div id="breath-circle">
          <div id="breath-emoji">🌿</div>
          <div id="breath-word">ready</div>
        </div>
      </div>
      <div id="phase-label">CYCLE</div>
      <div id="phase-timer">—</div>
      <div id="phase-name"></div>

      <div id="breath-controls">
        <button class="ctrl-btn active" id="btn-start" onclick="toggleBreath()">▶ Start Breathing</button>
        <button class="ctrl-btn" id="btn-pattern" onclick="cyclePattern()">4-4-4</button>
      </div>
    </div>

    <!-- Script -->
    <div id="script-section">
      <div id="script-title">1-Minute Meditation Script</div>
      <div id="script-lines"></div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
    </div>

    <!-- Stats -->
    <div id="stats-row">
      <div class="stat"><div class="stat-val" id="stat-breaths">0</div><div class="stat-label">Breaths</div></div>
      <div class="stat"><div class="stat-val" id="stat-time">0s</div><div class="stat-label">Time</div></div>
      <div class="stat"><div class="stat-val" id="stat-cycles">0</div><div class="stat-label">Cycles</div></div>
    </div>

    <button id="reset-btn" onclick="resetAll()">↺ Try Another Place</button>
  </div>

</div>

<script>
// ── Living background canvas ──────────────────────────────────────────────────
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,particles=[];

  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;initParticles()}
  window.addEventListener('resize',resize);

  function initParticles(){
    particles=[];
    const n=Math.floor(W*H/18000);
    for(let i=0;i<n;i++) particles.push(mkParticle(true));
  }

  function mkParticle(rand=false){
    return{
      x:Math.random()*W,
      y:rand?Math.random()*H:H+20,
      r:Math.random()*1.8+.5,
      speed:Math.random()*.4+.15,
      drift:Math.random()*.6-.3,
      opacity:Math.random()*.35+.08,
      hue:Math.random()*40+100
    };
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // deep gradient background
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#060f09');
    g.addColorStop(.5,'#0b1a12');
    g.addColorStop(1,'#0d2218');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

    // stars/fireflies
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},60%,75%,${p.opacity})`;
      ctx.fill();
      p.y-=p.speed;p.x+=p.drift;
      if(p.y<-10){Object.assign(p,mkParticle(false));p.x=Math.random()*W}
    });

    // moon glow
    const mg=ctx.createRadialGradient(W*.78,H*.12,0,W*.78,H*.12,W*.25);
    mg.addColorStop(0,'rgba(201,168,76,.04)');
    mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);

    // horizon glow
    const hg=ctx.createRadialGradient(W*.5,H,0,W*.5,H,H*.6);
    hg.addColorStop(0,'rgba(74,124,89,.08)');
    hg.addColorStop(1,'transparent');
    ctx.fillStyle=hg;ctx.fillRect(0,0,W,H);

    requestAnimationFrame(draw);
  }
  resize();draw();
})();

      "You are part of this cycle. Rest now, like the trees. Your spring will come.",
    ]},
  'waterfall cove':{emoji:'💧',mood:'Fresh & Alive',color:'#3a8a7a',
    sounds:'the constant rush and tumble of water',scent:'cool mist and wet stone and moss',
    words:['rushing','clear','alive','fresh','constant'],
    script:[
      "You step into a hidden cove where a waterfall tumbles from mossy rock into a crystal pool.",
      "Cool mist drifts over you — your skin drinks in the freshness before your lungs even ask.",
      "Breathe in deeply through your nose — cold, clean, mineral-fresh, carrying the mountain's gift.",
      "The waterfall never pauses. It is pure, uninterrupted giving. Let this breath be like that.",
      "Exhale fully — your outbreath meets the mist and becomes part of the water's endless cycle.",
      "The sound of falling water is one of nature's oldest meditations. Your ancestors knew this peace.",
      "Watch the water — it finds every crack, every path, moving always toward its natural level.",
      "You too find your level when you stop forcing and simply flow with what is.",
      "Breathe in the freshness of this living water. Breathe out all staleness, all stagnation.",
      "The waterfall will be here long after today. Return here in your mind whenever you need refreshing.",
    ]},
};

function getTheme(loc){
  const l=loc.toLowerCase().trim();
  for(const key of Object.keys(THEMES)) if(l.includes(key.split(' ')[0])||l.includes(key)) return THEMES[key];
  // Build a generic theme from the location name
  return buildGenericTheme(loc);
}

function buildGenericTheme(loc){
  const words=loc.toLowerCase().split(/\s+/);
  const emojis=['🌿','🍃','🌱','✨','🌺','🌸','🌾','🏞'];
  const emoji=emojis[Math.floor(Math.random()*emojis.length)];
  return{
    emoji,mood:'Peaceful & Present',color:'#4a7c59',
    script:[
      `Close your eyes and let your mind travel gently to the ${loc}.`,
      `Feel the air of this place on your skin — notice its temperature, its texture, its particular silence.`,
      `Breathe in slowly… draw in the unique atmosphere of the ${loc} with your whole body.`,
      `Notice what the ${loc} smells like. Every natural place carries its own invisible signature.`,
      `Hold your breath softly — and listen. What sounds belong to this place?`,
      `Exhale completely… releasing your weight into the ground of this imagined landscape.`,
      `The ${loc} has its own rhythm. Your breath begins to match it — unhurried and natural.`,
      `You are a guest here, and a welcome one. Nature receives you without condition.`,
      `Breathe in the aliveness of this place. Breathe out everything that kept you from arriving fully.`,
      `Carry this place inside you. Wherever you go, you can return here with a single breath.`,
    ]
  };
}

// ── Breath engine ─────────────────────────────────────────────────────────────
const PATTERNS={
  '4-4-4':{inhale:4,hold:4,exhale:4,label:'Box Breath'},
  '4-7-8':{inhale:4,hold:7,exhale:8,label:'Calm Breath'},
  '4-0-6':{inhale:4,hold:0,exhale:6,label:'Relax Breath'},
};
const PATTERN_KEYS=Object.keys(PATTERNS);
let currentPatternIdx=0;

let breathRunning=false,breathInterval=null;
let phase='inhale',phaseCount=0,totalBreaths=0,totalCycles=0,elapsedSec=0;
let timerInterval=null,scriptInterval=null;
let currentLine=0,scriptLines=[],theme=null;

function setPreset(val){
  document.getElementById('location-input').value=val;
  document.getElementById('location-input').focus();
}

function generate(){
  const loc=document.getElementById('location-input').value.trim();
  if(!loc){
    document.getElementById('location-input').style.borderColor='rgba(201,168,76,.5)';
    document.getElementById('location-input').focus();
    setTimeout(()=>document.getElementById('location-input').style.borderColor='',1200);
    return;
  }
  theme=getTheme(loc);
  scriptLines=theme.script;

  // Reset state
  breathRunning=false;phase='inhale';phaseCount=0;totalBreaths=0;totalCycles=0;elapsedSec=0;currentLine=0;
  clearInterval(breathInterval);clearInterval(timerInterval);clearInterval(scriptInterval);

  // Populate UI
  document.getElementById('loc-name').textContent=loc.toUpperCase();
  document.getElementById('loc-mood').textContent=theme.mood;
  document.getElementById('breath-emoji').textContent=theme.emoji;
  document.getElementById('breath-word').textContent='ready';
  document.getElementById('phase-timer').textContent='—';
  document.getElementById('phase-name').textContent='';
  document.getElementById('stat-breaths').textContent='0';
  document.getElementById('stat-time').textContent='0s';
  document.getElementById('stat-cycles').textContent='0';
  document.getElementById('progress-bar').style.width='0%';

  // Build script lines HTML
  document.getElementById('script-lines').innerHTML=scriptLines.map((line,i)=>`
    <div class="script-line" id="line-${i}">
      <span class="line-num">${String(i+1).padStart(2,'0')}</span>${line}
    </div>`).join('');

  // Update pattern button
  const p=PATTERNS[PATTERN_KEYS[currentPatternIdx]];
  document.getElementById('btn-pattern').textContent=`${p.inhale}-${p.hold>0?p.hold+'-':''}${p.exhale} ${p.label}`;
  document.getElementById('btn-start').textContent='▶ Start Breathing';
  document.getElementById('btn-start').classList.add('active');

  // Show card
  const card=document.getElementById('meditation-card');
  card.classList.add('visible');
  card.scrollIntoView({behavior:'smooth',block:'start'});
  document.getElementById('gen-btn').textContent='✦ Regenerate';

  // Spawn floating leaves
  spawnLeaves(theme.emoji);
}

function toggleBreath(){
  if(breathRunning) stopBreath(); else startBreath();
}

function startBreath(){
  breathRunning=true;
  document.getElementById('btn-start').textContent='◼ Stop';
  document.getElementById('btn-start').classList.remove('active');

  // Timer
  timerInterval=setInterval(()=>{
    elapsedSec++;
    document.getElementById('stat-time').textContent=elapsedSec<60?elapsedSec+'s':Math.floor(elapsedSec/60)+'m '+(elapsedSec%60)+'s';
    // progress (60 seconds = 100%)
    document.getElementById('progress-bar').style.width=Math.min(100,(elapsedSec/60)*100)+'%';
  },1000);

  // Script line ticker — change line every ~6 seconds
  currentLine=0;highlightLine(0);
  scriptInterval=setInterval(()=>{
    currentLine++;
    if(currentLine<scriptLines.length) highlightLine(currentLine);
    else clearInterval(scriptInterval);
  },6000);

  runPhase();
}

function stopBreath(){
  breathRunning=false;
  clearInterval(breathInterval);clearInterval(timerInterval);clearInterval(scriptInterval);
  document.getElementById('btn-start').textContent='▶ Start Breathing';
  document.getElementById('btn-start').classList.add('active');
  const circle=document.getElementById('breath-circle');
  circle.className='';void circle.offsetWidth;
  document.getElementById('breath-word').textContent='paused';
  document.getElementById('phase-name').textContent='';
}

function runPhase(){
  if(!breathRunning)return;
  const pat=PATTERNS[PATTERN_KEYS[currentPatternIdx]];
  const circle=document.getElementById('breath-circle');

  // Skip hold if 0
  if(phase==='hold'&&pat.hold===0){phase='exhale';runPhase();return;}

  const dur=phase==='inhale'?pat.inhale:phase==='hold'?pat.hold:pat.exhale;
  const labels={inhale:'Breathe In',hold:'Hold',exhale:'Breathe Out'};
  const bwords={inhale:'inhale…',hold:'hold…',exhale:'exhale…'};
  const bemoji={inhale:theme?theme.emoji:'🌿',hold:'✨',exhale:'🍃'};

  document.getElementById('phase-name').textContent=labels[phase];
  document.getElementById('breath-word').textContent=bwords[phase];
  document.getElementById('breath-emoji').textContent=bemoji[phase];

  // Animate circle
  circle.className='';
  void circle.offsetWidth;
  circle.style.animationDuration=dur+'s';
  circle.classList.add(phase);

  phaseCount=dur;
  document.getElementById('phase-timer').textContent=phaseCount;

  breathInterval=setInterval(()=>{
    phaseCount--;
    document.getElementById('phase-timer').textContent=Math.max(0,phaseCount);
    if(phaseCount<=0){
      clearInterval(breathInterval);
      if(phase==='inhale'){phase='hold';}
      else if(phase==='hold'){phase='exhale';totalBreaths++;}
      else{
        phase='inhale';totalCycles++;
        document.getElementById('stat-breaths').textContent=totalBreaths;
        document.getElementById('stat-cycles').textContent=totalCycles;
      }
      if(breathRunning)runPhase();
    }
  },1000);
}

function cyclePattern(){
  currentPatternIdx=(currentPatternIdx+1)%PATTERN_KEYS.length;
  const p=PATTERNS[PATTERN_KEYS[currentPatternIdx]];
  document.getElementById('btn-pattern').textContent=`${p.inhale}-${p.hold>0?p.hold+'-':''}${p.exhale} ${p.label}`;
  if(breathRunning){clearInterval(breathInterval);phase='inhale';runPhase();}
}

function highlightLine(idx){
  document.querySelectorAll('.script-line').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i<idx)el.classList.add('done');
    else if(i===idx){
      el.classList.add('active');
      el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
}

function resetAll(){
  stopBreath();
  document.getElementById('meditation-card').classList.remove('visible');
  document.getElementById('location-input').value='';
  document.getElementById('gen-btn').textContent='✦ Begin My Meditation';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Floating leaf particles ───────────────────────────────────────────────────
function spawnLeaves(emoji){
  document.querySelectorAll('.leaf-particle').forEach(e=>e.remove());
  for(let i=0;i<12;i++){
    const l=document.createElement('div');
    l.className='leaf-particle';
    l.textContent=emoji;
    const size=Math.random()*16+10;
    const left=Math.random()*100;
    const dur=Math.random()*12+8;
    const delay=Math.random()*10;
    l.style.cssText=`position:fixed;left:${left}%;bottom:-40px;font-size:${size}px;
      z-index:1;pointer-events:none;animation:leafFloat ${dur}s ${delay}s linear infinite;opacity:0`;
    document.body.appendChild(l);
  }
}

// Enter key support
document.getElementById('location-input').addEventListener('keydown',e=>{if(e.key==='Enter')generate()});
</script>

<style>
@keyframes leafFloat{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0}
  5%{opacity:.6}
  50%{transform:translateY(-50vh) rotate(180deg) translateX(30px)}
  95%{opacity:.2}
  100%{transform:translateY(-105vh) rotate(360deg) translateX(-20px);opacity:0}
}
</style>
</body>
